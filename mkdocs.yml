site_name: Aeon Docs
site_description: Beautiful, developer-friendly documentation for the Aeon multi-agent DSL.
site_author: Durga Sai
use_directory_urls: true

theme:
  name: mkdocs
  custom_dir: overrides
  color_mode: dark
  user_color_mode_toggle: true
  nav_style: dark
  locale: en
  navigation_depth: 3
  highlightjs: false

nav:
  - Home: index.md
  - DSL Guide:
      - Overview: guide/index.md
      - ORCH Files: guide/orch-files.md
      - AEON Files: guide/aeon-files.md
      - LIB Files: guide/lib-files.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/theme.css

extra_javascript:
  - javascripts/ui.js

extra:
  brand_tagline: Agent orchestration DSL

copyright: Copyright 2026 Durga Sai
