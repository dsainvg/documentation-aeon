site_name: Aeon Docs
site_description: Beautiful, developer-friendly documentation for the Aeon multi-agent DSL.
site_author: Durga Sai
use_directory_urls: true

theme:
  name: mkdocs
  custom_dir: overrides
  color_mode: dark
  user_color_mode_toggle: true
  nav_style: dark
  locale: en
  navigation_depth: 3
  highlightjs: false

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/theme.css

extra_javascript:
  - javascripts/ui.js

extra:
  brand_tagline: Agent orchestration DSL

copyright: Copyright 2026 Durga Sai

nav:
  - Home: index.md
  - AEON FILE:
      - Overview: AEON FILE.md
      - AEON Includes: AEON FILE/AEON Includes.md
      - AEON Memory: AEON FILE/AEON Memory.md
      - TASKS: AEON FILE/TASKS.md
  - LIB FILE:
      - Overview: LIB FILE.md
      - Functions: LIB FILE/Functions.md
  - ORCH FILES:
      - Overview: ORCH FILES.md
      - Orch Includes:
          - Overview: ORCH FILES/Orch Includes.md
          - Environment ( env): ORCH FILES/Orch Includes/Environment ( env).md
      - ORCH MEMORY: ORCH FILES/ORCH MEMORY.md
  - Routing: Routing.md
  - Usage and Structure: Usage and Structure.md
