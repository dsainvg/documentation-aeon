site_name: ORCH Documentation
site_description: Beautiful, developer-friendly documentation for the ORCH orchestration DSL.
site_author: Durga Sai
use_directory_urls: true

theme:
  name: mkdocs
  custom_dir: overrides
  color_mode: dark
  user_color_mode_toggle: true
  nav_style: dark
  locale: en
  navigation_depth: 3
  highlightjs: false

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/theme.css

extra_javascript:
  - javascripts/ui.js

extra:
  brand_tagline: Agent orchestration DSL

copyright: Copyright 2026 Durga Sai

nav:
  - Home: index.md
  - Installation:
      - Overview: Installation.md
      - Downloads: Installation/Downloads.md
      - Releases:
          - Latest: releases/latest/README.md
          - Recent: releases/recent/README.md
          - v2.0.0: releases/v2.0.0/README.md
  - Usage and Structure: Usage and Structure.md
  - ORCH Files:
      - Overview: ORCH FILES.md
      - Includes: ORCH FILES/Orch Includes.md
      - Clones Library: ORCH FILES/Orch Includes/Clones ( clones).md
      - Environment Variables: ORCH FILES/Orch Includes/Environment ( env).md
      - Global Memory: ORCH FILES/ORCH MEMORY.md
      - Routing (Shared): Routing.md
  - AEON Files:
      - Overview: AEON FILE.md
      - Includes: AEON FILE/AEON Includes.md
      - Agent Memory: AEON FILE/AEON Memory.md
      - Tasks: AEON FILE/TASKS.md
      - Routing (Shared): Routing.md
  - Library Files:
      - Overview: LIB FILE.md
      - Functions: LIB FILE/Functions.md

